<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>هەنبانەبۆرینه</title>
<meta name="theme-color" content="#F1E6CE">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F1E6CE;
    --paper-2: #E7D7AF;
    --card: #FBF5E6;
    --ink: #2B2118;
    --ink-soft: #5A4B39;
    --ink-faint: #8A7A62;
    --red: #9C2B3A;
    --red-dark: #7A2029;
    --gold: #B8862E;
    --teal: #2E5C58;
    --line: #C9AF7E;
    --shadow: 0 6px 18px rgba(43,33,24,0.12);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Vazirmatn', 'Noto Naskh Arabic', sans-serif;
    min-height: 100vh;
    overscroll-behavior-y: none;
  }

  body{
    background-image:
      radial-gradient(circle at 15% 8%, rgba(184,134,46,0.10), transparent 45%),
      radial-gradient(circle at 85% 92%, rgba(46,92,88,0.10), transparent 45%);
    padding-bottom: 40px;
  }

  .wrap{
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* ---------- HEADER ---------- */
  header{
    padding: 22px 0 0;
    text-align: center;
  }

  .brand{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
  }

  .brand svg{ width:38px; height:38px; flex-shrink:0; }

  .brand h1{
    font-family:'Vazirmatn', 'Noto Naskh Arabic', serif;
    font-size: 26px;
    font-weight: 800;
    margin:0;
    color: var(--ink);
    letter-spacing: 0.5px;
    text-shadow: 0 1px 2px rgba(184,134,46,0.15);
  }

  .brand-sub{
    margin: 4px 0 0;
    font-size: 12.5px;
    color: var(--ink-faint);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* kilim zigzag divider — the signature element */
  .kilim{
    width:100%;
    height:14px;
    margin: 16px 0 14px;
    display:block;
  }

  /* ---------- TABS ---------- */
  .tabs{
    display:flex;
    background: var(--paper-2);
    border-radius: 14px;
    padding: 4px;
    gap: 4px;
    box-shadow: inset 0 1px 3px rgba(43,33,24,0.15);
  }

  .tab{
    flex:1;
    text-align:center;
    padding: 10px 4px;
    font-size: 13.5px;
    font-weight: 700;
    color: var(--ink-soft);
    border-radius: 10px;
    cursor:pointer;
    border:none;
    background: transparent;
    font-family: 'Vazirmatn', 'Noto Naskh Arabic', sans-serif;
    transition: background .2s ease, color .2s ease, transform .15s ease;
    white-space: nowrap;
  }

  .tab.active{
    background: var(--red);
    color: #F6EDDC;
    box-shadow: var(--shadow);
  }

  .tab:active{ transform: scale(0.97); }

  /* ---------- SEARCH ---------- */
  .search-box{
    position:relative;
    margin-top: 16px;
  }

  .search-box input{
    width:100%;
    padding: 14px 46px 14px 16px;
    border-radius: 14px;
    border: 1.5px solid var(--line);
    background: var(--card);
    font-family: 'Vazirmatn', 'Noto Naskh Arabic', sans-serif;
    font-size: 16.5px;
    font-weight: 500;
    color: var(--ink);
    outline: none;
    box-shadow: var(--shadow);
  }

  .search-box input::placeholder{ color: var(--ink-faint); font-weight: 400; }

  .search-box input:focus{
    border-color: var(--red);
  }

  .search-icon{
    position:absolute;
    right: 16px;
    top:50%;
    transform: translateY(-50%);
    width: 20px; height:20px;
    color: var(--ink-faint);
    pointer-events:none;
  }

  .hint{
    margin: 8px 4px 0;
    font-size: 12.5px;
    color: var(--ink-faint);
    font-weight: 400;
  }

  /* ---------- RESULTS ---------- */
  .count-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin: 18px 4px 10px;
  }

  .count-row span{ font-size: 13px; color: var(--ink-faint); font-weight: 500; }

  .results{
    display:flex;
    flex-direction:column;
    gap: 12px;
  }

  .card{
    background: var(--card);
    border-radius: 16px;
    padding: 16px 18px;
    box-shadow: var(--shadow);
    border-right: 4px solid var(--gold);
    animation: rise .25s ease both;
  }

  @keyframes rise{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .card .word-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
    flex-wrap: wrap;
  }

  .card .word{
    font-family:'Vazirmatn', 'Noto Naskh Arabic', serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--red-dark);
  }

  .card .translation{
    margin-top: 6px;
    font-size: 17px;
    color: var(--ink);
    font-weight: 700;
  }

  .card .definition{
    margin-top: 8px;
    font-size: 15px;
    line-height: 1.9;
    color: var(--ink-soft);
    font-weight: 400;
  }

  .synonyms{
    margin-top: 10px;
    display:flex;
    flex-wrap:wrap;
    gap: 6px;
    align-items:center;
  }

  .synonyms .label{
    font-size: 12.5px;
    color: var(--ink-faint);
    margin-left: 4px;
    font-weight: 500;
  }

  .chip{
    background: var(--paper-2);
    color: var(--ink-soft);
    font-size: 12.5px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    font-weight: 500;
  }

  /* ---------- EMPTY / IDLE STATES ---------- */
  .state{
    text-align:center;
    padding: 50px 20px;
    color: var(--ink-faint);
  }

  .state svg{ width:64px; height:64px; opacity:.5; margin-bottom:14px; }
  .state p{ font-size: 15px; line-height: 1.8; margin:0; font-weight: 400; }
  .state strong{ color: var(--ink-soft); font-weight: 700; }

  footer{
    text-align:center;
    margin-top: 30px;
    font-size: 12px;
    color: var(--ink-faint);
    font-weight: 400;
  }

  @media (prefers-reduced-motion: reduce){
    .card{ animation: none; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="brand">
      <!-- mountain mark: "کورد هاوڕێی نییە جگە لە چیاکان" -->
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 38L15 18L22 28L28 20L46 38H2Z" fill="var(--teal)"/>
        <path d="M15 18L18 22.5L15 24L11 22L15 18Z" fill="#F1E6CE"/>
        <path d="M28 20L30.5 23.5L28 25L25 23L28 20Z" fill="#F1E6CE"/>
        <circle cx="38" cy="12" r="5" fill="var(--gold)"/>
      </svg>
      <h1>هەنبانەبۆرینه</h1>
    </div>
    <p class="brand-sub">KURDISH · PERSIAN DICTIONARY</p>

    <svg class="kilim" viewBox="0 0 400 14" preserveAspectRatio="none">
      <polyline points="0,14 20,0 40,14 60,0 80,14 100,0 120,14 140,0 160,14 180,0 200,14 220,0 240,14 260,0 280,14 300,0 320,14 340,0 360,14 380,0 400,14"
        fill="none" stroke="var(--gold)" stroke-width="2"/>
      <polyline points="0,7 20,14 40,7 60,14 80,7 100,14 120,7 140,14 160,7 180,14 200,7 220,14 240,7 260,14 280,7 300,14 320,7 340,14 360,7 380,14 400,7"
        fill="none" stroke="var(--red)" stroke-width="1.4" opacity="0.55"/>
    </svg>
  </header>

  <div class="tabs" role="tablist">
    <button class="tab active" data-mode="kk">کوردی ⇄ کوردی</button>
    <button class="tab" data-mode="pk">کوردی → فارسی</button>
    <button class="tab" data-mode="kp">فارسی → کوردی</button>
  </div>

  <div class="search-box">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="searchInput" type="text" placeholder="وشەیەک بنووسە..." autocomplete="off">
  </div>
  <p class="hint" id="modeHint"></p>

  <div class="count-row" id="countRow" style="display:none">
    <span id="countText"></span>
  </div>

  <div class="results" id="results"></div>

  <div class="state" id="idleState">
    <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="20" cy="20" r="13"/>
      <line x1="29.5" y1="29.5" x2="41" y2="41"/>
    </svg>
    <p>وشەیەک بنووسە بۆ دەستپێکردنی گەڕان<br><strong id="idleModeLabel"></strong></p>
  </div>

  <div class="state" id="emptyState" style="display:none">
    <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M24 4L44 40H4L24 4Z"/>
      <line x1="24" y1="18" x2="24" y2="27"/>
      <circle cx="24" cy="33" r="1.2" fill="currentColor"/>
    </svg>
    <p>هیچ ئەنجامێک نەدۆزرایەوە.<br><strong>تکایە وشەیەکی تر تاقی بکەرەوە.</strong></p>
  </div>

  <footer>فەرهەنگی کوردی · دروستکراوە بۆ ئەندرۆید</footer>
</div>

<script src="data.js"></script>
<script>
  const state = { mode: 'kk', query: '' };

  const modeHints = {
    kk: 'گەڕان لەناو وشە کوردیەکان — واتا و هاوواتاکانیان بە کوردی',
    pk: 'وشەیەکی فارسی بنووسە بۆ دۆزینەوەی وەرگێڕانی کوردی',
    kp: 'وشەیەکی کوردی بنووسە بۆ دۆزینەوەی وەرگێڕانی فارسی'
  };
  const idleLabels = {
    kk: 'کوردی ⇄ کوردی',
    pk: 'فارسی → کوردی',
    kp: 'کوردی → فارسی'
  };

  const tabs = document.querySelectorAll('.tab');
  const searchInput = document.getElementById('searchInput');
  const resultsEl = document.getElementById('results');
  const idleState = document.getElementById('idleState');
  const emptyState = document.getElementById('emptyState');
  const countRow = document.getElementById('countRow');
  const countText = document.getElementById('countText');
  const modeHint = document.getElementById('modeHint');
  const idleModeLabel = document.getElementById('idleModeLabel');

  function setMode(mode){
    state.mode = mode;
    tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
    modeHint.textContent = modeHints[mode];
    idleModeLabel.textContent = idleLabels[mode];
    searchInput.placeholder = mode === 'pk' ? 'وشەیەکی فارسی بنووسە...' : 'وشەیەکی کوردی بنووسە...';
    runSearch();
  }

  tabs.forEach(t => t.addEventListener('click', () => setMode(t.dataset.mode)));

  function norm(s){
    return (s || '').toString().trim().toLowerCase();
  }

  function matchEntry(entry, q, mode){
    q = norm(q);
    if(!q) return false;

    if(mode === 'pk'){
      // فارسی → کوردی : گەڕان لەناو وشەی فارسی و هاوواتا فارسیەکان
      if(norm(entry.persian).includes(q)) return true;
      if((entry.persian_synonyms||[]).some(s => norm(s).includes(q))) return true;
      return false;
    }

    // kk و kp: هەردووکیان لەسەر وشەی کوردی و هاوواتا کوردیەکان دەگەڕێن
    if(norm(entry.kurdish).includes(q)) return true;
    if((entry.kurdish_synonyms||[]).some(s => norm(s).includes(q))) return true;
    return false;
  }

  function escapeHtml(str){
    return (str||'').toString()
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderCard(entry, mode){
    const synKurdish = entry.kurdish_synonyms || [];
    const synPersian = entry.persian_synonyms || [];

    let headWord, subTranslation, defBlock = '', synBlock = '';

    if(mode === 'pk'){
      headWord = entry.persian;
      subTranslation = entry.kurdish;
    } else if(mode === 'kp'){
      headWord = entry.kurdish;
      subTranslation = entry.persian;
    } else {
      headWord = entry.kurdish;
      subTranslation = '';
    }

    if(mode === 'kk' && entry.kurdish_meaning){
      defBlock = `<div class="definition">${escapeHtml(entry.kurdish_meaning)}</div>`;
    }

    if(mode === 'kk' && synKurdish.length){
      synBlock = `<div class="synonyms"><span class="label">هاوواتا:</span>${synKurdish.map(s=>`<span class="chip">${escapeHtml(s)}</span>`).join('')}</div>`;
    } else if(mode !== 'kk' && (synKurdish.length || synPersian.length)){
      const chips = mode === 'pk' ? synPersian : synKurdish;
      if(chips.length){
        synBlock = `<div class="synonyms"><span class="label">هاوواتا:</span>${chips.map(s=>`<span class="chip">${escapeHtml(s)}</span>`).join('')}</div>`;
      }
    }

    return `
      <div class="card">
        <div class="word-row">
          <span class="word">${escapeHtml(headWord)}</span>
        </div>
        ${subTranslation ? `<div class="translation">${escapeHtml(subTranslation)}</div>` : ''}
        ${defBlock}
        ${synBlock}
      </div>
    `;
  }

  function runSearch(){
    const q = searchInput.value;
    const data = (typeof KURDISH_DICTIONARY !== 'undefined') ? KURDISH_DICTIONARY : [];

    if(!norm(q)){
      idleState.style.display = 'block';
      emptyState.style.display = 'none';
      countRow.style.display = 'none';
      resultsEl.innerHTML = '';
      return;
    }

    idleState.style.display = 'none';

    const matches = data.filter(e => matchEntry(e, q, state.mode));

    if(matches.length === 0){
      emptyState.style.display = 'block';
      countRow.style.display = 'none';
      resultsEl.innerHTML = '';
      return;
    }

    emptyState.style.display = 'none';
    countRow.style.display = 'flex';
    countText.textContent = `${matches.length} ئەنجام دۆزرایەوە`;
    resultsEl.innerHTML = matches.map(e => renderCard(e, state.mode)).join('');
  }

  let debounceTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(runSearch, 120);
  });

  setMode('kk');
</script>
</body>
</html>
